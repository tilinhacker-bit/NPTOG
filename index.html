<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OG Hub</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons (Heroicons minimal via inline svg will be used) -->
  <link rel="manifest" href="/manifest.json" />

  <!-- html2canvas for roster download -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    /* Themeable CSS variables for shift colors */
    :root{
      --c-duty: #ef4444;    /* red */
      --c-pre:  #f97316;    /* orange */
      --c-ord:  #3b82f6;    /* blue */
      --c-off:  #6b7280;    /* gray */
      --c-rest: #10b981;    /* green */
      --c-anes: #8b5cf6;    /* purple */
    }
    .shift-duty{ background: var(--c-duty); }
    .shift-pre{ background: var(--c-pre); }
    .shift-ord{ background: var(--c-ord); }
    .shift-off{ background: var(--c-off); }
    .shift-rest{ background: var(--c-rest); }
    .shift-anes{ background: var(--c-anes); }

    /* Onboarding overlay */
    #onboardOverlay { background: rgba(0,0,0,0.6); }
    /* Simple transition for expandable rows */
    .expandable { transition: max-height .25s ease; overflow: hidden; }
    .hidden-scrollbar::-webkit-scrollbar { display: none; } /* hide chrome scrollbar for nicer look */
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">

  <!-- Onboarding Overlay -->
  <div id="onboardOverlay" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none;">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-xl p-6">
      <div id="onboardStep1" class="">
        <h2 class="text-2xl font-semibold mb-4">Who are you?</h2>
        <div class="grid grid-cols-1 gap-3">
          <button data-type="HO" class="onboardChoose py-3 px-4 rounded bg-indigo-600 text-white font-medium">House Officer (HO)</button>
          <button data-type="AS" class="onboardChoose py-3 px-4 rounded bg-emerald-600 text-white font-medium">Assistant Surgeon (AS)</button>
          <button data-type="Other" class="onboardChoose py-3 px-4 rounded bg-gray-500 text-white font-medium">None of these (View Only)</button>
        </div>
      </div>

      <div id="onboardStep2" class="mt-4" style="display:none;">
        <h2 id="onboardStep2Title" class="text-xl font-semibold mb-3"></h2>
        <div id="onboardStep2Options" class="grid grid-cols-3 gap-2"></div>
        <div class="mt-4 flex justify-between">
          <button id="onboardBack" class="px-3 py-2 rounded border">Back</button>
          <button id="onboardContinue" class="px-3 py-2 rounded bg-indigo-600 text-white">Continue</button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Container -->
  <div id="app" class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-white shadow-md">
      <div class="flex items-center space-x-3">
        <div id="logo" class="cursor-pointer select-none flex items-center space-x-2">
          <svg id="logoIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-8 w-8 text-rose-500"><path fill="currentColor" d="M12 2L15 8H9L12 2Z"/><path fill="currentColor" d="M4 13h16v7H4z"/></svg>
          <span class="font-bold text-lg">OG Hub</span>
        </div>
        <button id="langBtn" class="p-2 rounded hover:bg-slate-100" title="Language/About">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M12 20l9-12H3l9 12z"/></svg>
        </button>
        <button id="aboutBtn" class="p-2 rounded hover:bg-slate-100" title="About">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
        </button>
      </div>

      <div class="flex items-center space-x-3">
        <button id="colorPickerOpen" class="p-2 rounded hover:bg-slate-100" title="Color Picker">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 00-7 7c0 3.86 3.14 7 7 7a7 7 0 007-7 3 3 0 00-3-3 1 1 0 01-1-1 1 1 0 00-1-1 3 3 0 00-4 0 1 1 0 01-1 1 1 1 0 00-1 1 3 3 0 00-3 3z"/></svg>
        </button>

        <button id="installBtn" class="px-3 py-1 rounded bg-slate-200 hidden">Install App</button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="mainArea" class="flex-1 p-4 overflow-auto">
      <!-- Views container -->
      <div id="views" class="space-y-4">
        <!-- Today View -->
        <section id="viewToday" class="">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-2">
              <button id="prevDay" class="px-3 py-1 rounded bg-slate-100">‹ Prev</button>
              <button id="todayBtn" class="px-3 py-1 rounded bg-slate-100">Today</button>
              <button id="nextDay" class="px-3 py-1 rounded bg-slate-100">Next ›</button>
              <div id="dateLabel" class="ml-4 font-medium"></div>
            </div>
          </div>

          <div id="statusArea" class=""></div>
        </section>

        <!-- Roster View -->
        <section id="viewRoster" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-2">
              <select id="rosterMonth" class="px-3 py-1 rounded border">
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
              </select>
              <button id="downloadRoster" class="px-3 py-1 rounded bg-indigo-600 text-white">Download PNG</button>
            </div>
          </div>

          <div id="rosterArea" class="bg-white p-3 rounded shadow-sm overflow-auto">
            <!-- Roster will be injected -->
          </div>
        </section>

        <!-- Directory View -->
        <section id="viewDirectory" class="hidden">
          <div id="directoryArea" class="bg-white p-3 rounded shadow-sm">
            <!-- Directory injected -->
          </div>
        </section>

        <!-- Admin View (hidden until unlocked) -->
        <section id="viewAdmin" class="hidden">
          <div class="bg-white p-3 rounded shadow-sm" id="adminArea">
            <!-- Admin stats -->
          </div>
        </section>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-white border-t p-1 flex justify-around">
      <button class="navTab py-2 px-4 text-center" data-target="viewToday"><div>🏠</div><div class="text-xs">Today</div></button>
      <button class="navTab py-2 px-4 text-center" data-target="viewRoster"><div>📅</div><div class="text-xs">Roster</div></button>
      <button class="navTab py-2 px-4 text-center" data-target="viewDirectory"><div>📇</div><div class="text-xs">Directory</div></button>
    </nav>
  </div>

  <!-- Color Picker Modal -->
  <div id="colorModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none; background: rgba(0,0,0,0.5);">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-6">
      <h3 class="text-lg font-semibold mb-3">Theme & Color Picker</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <h4 class="font-medium">Presets</h4>
          <div class="flex space-x-2 mt-2">
            <button class="presetBtn px-3 py-1 rounded bg-rose-100" data-preset="pastel">Pastel</button>
            <button class="presetBtn px-3 py-1 rounded bg-amber-100" data-preset="vibrant">Vibrant</button>
            <button class="presetBtn px-3 py-1 rounded bg-sky-100" data-preset="ocean">Ocean</button>
            <button class="presetBtn px-3 py-1 rounded bg-neutral-100" data-preset="mono">Monochrome</button>
          </div>
        </div>
        <div>
          <h4 class="font-medium">Custom Colors</h4>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <label class="text-xs">Duty <input type="color" id="colDuty" value="#ef4444"></label>
            <label class="text-xs">Pre <input type="color" id="colPre" value="#f97316"></label>
            <label class="text-xs">Ord <input type="color" id="colOrd" value="#3b82f6"></label>
            <label class="text-xs">Off <input type="color" id="colOff" value="#6b7280"></label>
            <label class="text-xs">Rest <input type="color" id="colRest" value="#10b981"></label>
            <label class="text-xs">Anes <input type="color" id="colAnes" value="#8b5cf6"></label>
          </div>
        </div>
      </div>
      <div class="mt-4 flex justify-end space-x-2">
        <button id="closeColorModal" class="px-3 py-1 rounded border">Cancel</button>
        <button id="saveColors" class="px-3 py-1 rounded bg-indigo-600 text-white">Save</button>
      </div>
    </div>
  </div>

  <!-- Minimal offline fallback -->
  <template id="offlineFallback">
    <div class="p-6 text-center">
      <h3 class="text-xl font-semibold">Offline</h3>
      <p class="mt-2">You are offline. Some features may be limited.</p>
    </div>
  </template>

  <!-- Scripts -->
  <script type="module" src="/data.js"></script>
  <script type="module" src="/app.js"></script>

</body>
</html>
